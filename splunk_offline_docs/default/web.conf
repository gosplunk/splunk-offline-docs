[settings]
# Required for Simple XML / embedded HTML if used elsewhere
dashboard_html_allow_embeddable_content = true
dashboard_html_allow_iframes = true
dashboard_html_allow_inline_styles = true
dashboard_html_wrap_embed = true

[cache]
# Force browsers to re-fetch app static assets after deploys
cache-control = no-store

# Expose custom REST to Splunk Web (splunkd/__raw proxy); required for browser fetch/mvc.
[expose:offline_docs]
pattern = offline_docs
methods = GET,POST

[expose:offline_docs_status]
pattern = offline_docs/status
methods = GET

[expose:offline_docs_check]
pattern = offline_docs/check
methods = GET,POST

[expose:offline_docs_update]
pattern = offline_docs/update
methods = POST

[expose:offline_docs_settings]
pattern = offline_docs/settings
methods = GET,POST
